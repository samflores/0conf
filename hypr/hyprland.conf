        column_default_width = twothirds
        window_default_height = one
        focus_wrap = false
        # monitor_modes=DP-3=col

        monitor_options = (eDP-1 = (mode = row; column_default_width = twothirds; window_default_height = one), DP-8 = (mode = row; column_default_width = one; window_default_height = one))
    }
}

