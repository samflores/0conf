env = HYPRCURSOR_THEME,McMojave
env = HYPRCURSOR_SIZE,32
env = XCURSOR_THEME,McMojave
env = XCURSOR_SIZE,32
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = XDG_SCREENSHOTS_DIR, /home/samflores/Pictures/Screenshots

# █▀▀ ▀▄▀ █▀▀ █▀▀
# ██▄ █░█ ██▄ █▄▄
exec-once = hyprpm reload -n
exec-once = dbus-update-activation-environment DISPLAY I3SOCK SWAYSOCK WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland NO_AT_BRIDGE=1 DBUS_SESSION_BUS_ADDRESS DBUS_SESSION_BUS_PID DBUS_SESSION_BUS_WINDOWID XCURSOR_SIZE=32
exec-once = wl-clipboard-history -t
exec-once = hyprpaper
exec-once = gentoo-pipewire-launcher
exec-once = udiskie
exec-once = hypridle
exec-once = { pkill atuin || true; } && { rm -f "${HOME}/.local/share/atuin/atuin.sock"; } && atuin daemon
# exec-once = bash ${HOME}/.config/hypr/start-bars.sh
exec-once = hyprpanel
exec-once = [workspace 4 silent;] GTK_IM_MODULE=simple ghostty
# exec-once = ${HOME}/.cargo/bin/hyprland-monitor-attached ${HOME}/.config/hypr/start-way-displays.sh &
exec = gsettings set org.gnome.desktop.interface gtk-theme "Orchis-Dark-Compact"   # for GTK3 apps
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps

