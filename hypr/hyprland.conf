# monitor=eDP-1, 3840x2400@60, 0x0, 1.5
monitor=eDP-1, 1920x1080@60, 0x0, 1
monitor=HDMI-A-1, 3440x1440@60, 1920x0, 1
# monitor=DP-10, 1920x1080@60, 3320x1440, 1

# workspace=name:secret, monitor:eDP-1

workspace=1, monitor:eDP-1, default:true
workspace=2, monitor:eDP-1
workspace=3, monitor:eDP-1

workspace=4, monitor:HDMI-A-1, default:true
workspace=5, monitor:HDMI-A-1
workspace=6, monitor:HDMI-A-1

debug {
  overlay=false
}

# █ █▄░█ █▀█ █░█ ▀█▀
# █ █░▀█ █▀▀ █▄█ ░█░
input {
  kb_layout = us
  kb_variant = altgr-intl
  follow_mouse = 1
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  accel_profile = adaptive
  touchpad {
    disable_while_typing=1
    natural_scroll=1
    clickfinger_behavior=1
    middle_button_emulation=1
    tap-to-click=1
  }
}

device {
  name = at-translated-set-2-keyboard
  kb_layout = us
  kb_variant = colemak
}

device {
  name = bastard-keyboards-charybdis-mini-(3x6)-splinky
  kb_layout = us
  kb_variant = altgr-intl
}

gesture = 3, left, workspace, 8
gesture = 2, pinchout, fullscreen, maximize

# █▀▀ █▀▀ █▄░█ █▀▀ █▀█ ▄▀█ █░░
# █▄█ ██▄ █░▀█ ██▄ █▀▄ █▀█ █▄▄
general {
  gaps_in=3
  gaps_out=3
  border_size=0
  no_border_on_floating = true
  layout = dwindle
}

cursor {
  inactive_timeout = 3
}

# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄
misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  vrr = 1
  enable_swallow = true
  swallow_regex = ^(wezterm)$
}

# █▀▄ █▀▀ █▀▀ █▀█ █▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▄▀ ██▄ █▄▄ █▄█ █▀▄ █▀█ ░█░ █ █▄█ █░▀█
decoration {
  # █▀█ █▀█ █░█ █▄░█ █▀▄   █▀▀ █▀█ █▀█ █▄░█ █▀▀ █▀█
  # █▀▄ █▄█ █▄█ █░▀█ █▄▀   █▄▄ █▄█ █▀▄ █░▀█ ██▄ █▀▄
  rounding = 6

  # █▀█ █▀█ ▄▀█ █▀▀ █ ▀█▀ █▄█
  # █▄█ █▀▀ █▀█ █▄▄ █ ░█░ ░█░
  active_opacity = 1.0
  inactive_opacity = 0.75

  # █▄▄ █░░ █░█ █▀█
  # █▄█ █▄▄ █▄█ █▀▄
  blur {
    enabled = true
    size = 7
    passes = 3
  }

  # █▀ █░█ ▄▀█ █▀▄ █▀█ █░█░█
  # ▄█ █▀█ █▀█ █▄▀ █▄█ ▀▄▀▄▀
  shadow {
    enabled = true
    ignore_window = true
    offset = 2 2
    range = 4
    render_power = 2
    color = 0x66000000
  }
}

group {
    col.border_active = rgba(191919ff) rgba(191919ff) 45deg
    col.border_inactive = rgba(262626ff) rgba(262626ff) 45deg
    col.border_locked_active = rgba(ca9ee6ff) rgba(f2d5cfff) 45deg
    col.border_locked_inactive = rgba(b4befecc) rgba(6c7086cc) 45deg

     groupbar {
          # col.active = rgba(ca9ee6ff) rgba(f2d5cfff) 45deg
          # col.inactive = rgba(b4befecc) rgba(6c7086cc) 45deg
          # indicator_height = 3
          # render_titles = true
     }
}

animations {
  enabled=1
  bezier=easeOutSine, 0.39, 0.575, 0.565, 1
  animation=windows,1,2,easeOutSine,popin
  animation=fade,1,2,easeOutSine
  animation=workspaces,1,2,easeOutSine,slidefade 20%
}

