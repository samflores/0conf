# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄
bind = SUPER SHIFT, X, exec, hyprpicker -a -n
bind = CTRL ALT, L, exec, hyprlock
bind = SUPER, Return, exec, ghostty
bind = SUPER, Space, exec, /home/samflores/.cargo/bin/desx | /home/samflores/.cargo/bin/drmenu | sh
bind = SUPER, Tab, exec, ~/.local/bin/window-picker
bind = SUPER SHIFT, E, exec, ~/.local/bin/emoji-picker
bind = SUPER SHIFT, C, exec, ~/.local/bin/config-picker
bind = SUPER SHIFT, F, exec, ghostty -e yazi

# █▀ █▀▀ █▀█ █▀▀ █▀▀ █▄░█ █▀ █░█ █▀█ ▀█▀
# ▄█ █▄▄ █▀▄ ██▄ ██▄ █░▀█ ▄█ █▀█ █▄█ ░█░
bind = , Print, exec, hyprshot -m output --raw | satty -f -
bind = SHIFT, Print, exec, hyprshot -m region --raw | satty -f -
bind = CTRL SHIFT, Print, exec, hyprshot -m active -m window --raw | satty -f -

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioRewind, exec, playerctl position 10-
bind = , XF86AudioForward, exec, playerctl position 10+
bind = , XF86AudioRaiseVolume, exec, playerctl volume 0.05+
bind = , XF86AudioLowerVolume, exec, playerctl volume 0.05-
bind = , XF86MonBrightnessUp, exec, brightnessctl set 20+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 20-

bind = SUPER, T, submap, tools
submap = tools
bind = , B, exec, blueman-manager
bind = , B, submap, reset
bind = , V, exec, pavucontrol
bind = , V, submap, reset
bind = , W, exec, wpa_gui
bind = , W, submap, reset
bind = , F, exec, nemo
bind = , F, submap, reset
bind = , escape, submap, reset
submap=reset

bind = SUPER, W, submap, web
submap = web
bind = , Q, exec, qutebrowser
bind = , Q, submap, reset
bind = SHIFT, Q, exec, qutebrowser --target private-window
bind = SHIFT, Q, submap, reset
bind = , C, exec, chromium
bind = , C, submap, reset
bind = SHIFT, C, exec, chromium --incognito
bind = SHIFT, C, submap, reset
bind = , F, exec, firefox-bin
bind = , F, submap, reset
bind = SHIFT, F, exec, firefox-bin --private-window
bind = SHIFT, F, submap, reset
bind = , escape, submap, reset
submap=reset
